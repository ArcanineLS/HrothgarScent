name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dalamud = "$env:APPDATA\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dalamud | Out-Null
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile "$env:RUNNER_TEMP\dalamud.zip"
          Expand-Archive -Force -Path "$env:RUNNER_TEMP\dalamud.zip" -DestinationPath $dalamud

      - name: Build (Release)
        run: dotnet build HrothgarScent/HrothgarScent.csproj -c Release

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          $v = $ref -replace '^v', ''
          if ([string]::IsNullOrWhiteSpace($v) -or $v -eq $ref) {
            # Not a v* tag (e.g. manual dispatch): fall back to the built manifest version.
            $manifest = Get-Content "HrothgarScent/bin/Release/HrothgarScent/HrothgarScent.json" -Raw | ConvertFrom-Json
            $v = $manifest.AssemblyVersion
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: HrothgarScent ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: HrothgarScent/bin/Release/HrothgarScent/latest.zip
